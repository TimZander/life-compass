<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  {% if site.description %}<meta name="description" content="{{ site.description | strip_newlines }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='9' fill='none' stroke='%231f6f6b' stroke-width='2'/><polygon points='12,6 14.2,12 12,18 9.8,12' fill='%231f6f6b'/></svg>">
</head>
<body>
  <header class="site-nav">
    <div class="container">
      <a class="brand" href="{{ '/' | relative_url }}">
        <svg class="brand-mark" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <polygon points="12,5.5 14.4,12 12,18.5 9.6,12" fill="currentColor"/>
        </svg>
        Life Compass
      </a>
      <nav>
        <a href="{{ '/one-page-anchor.html' | relative_url }}">Quick&nbsp;Start</a>
        <a href="{{ '/days/day-1-excavation.html' | relative_url }}">5-Day</a>
        <a href="{{ '/rigorous/' | relative_url }}">Rigorous</a>
        <a href="{{ '/with-a-partner.html' | relative_url }}">Partner</a>
        <a href="{{ '/optional-add-ons.html' | relative_url }}">Add-ons</a>
      </nav>
    </div>
  </header>

  <main>
    <article class="container">
      {{ content }}
    </article>
  </main>

  <footer class="site-foot">
    <div class="container">
      <span>A letter from a clear-headed you to a confused one.</span>
      <a href="https://github.com/{{ site.github.repository_nwo | default: 'TimZander/life-compass' }}">View on GitHub →</a>
    </div>
  </footer>
</body>
</html>

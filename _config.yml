# GitHub Pages configuration for the Life Compass site.
#
# This repo needs no build tooling: GitHub Pages runs Jekyll for you and
# auto-enables the plugins that make the existing Markdown "just work" —
#   - jekyll-readme-index          : README.md becomes the site home page
#   - jekyll-optional-front-matter : plain .md files render as pages
#   - jekyll-relative-links        : [text](day-2-values.md) links are
#                                    rewritten to the generated page URLs
#
# To publish: Settings -> Pages -> Build and deployment ->
#   Source: "Deploy from a branch", Branch: main / (root) -> Save.

title: Life Compass
description: >-
  A 5-day investigation to surface your values, passions, and purpose —
  and turn them into a reference you can use for real decisions.
# Custom layout + stylesheet live in _layouts/ and assets/css/, so no
# packaged `theme:` is set — this site is themed by hand for a calm,
# journal-style reading experience.

# Project site lives under /<repo>, so the base path must be set or every
# asset and link 404s. For a user/org site (served at the domain root) set
# baseurl to "" instead.
url: https://timzander.github.io
baseurl: /life-compass

# These are auto-enabled on GitHub Pages, but listing them makes local
# builds match and keeps behavior explicit.
plugins:
  - jekyll-readme-index
  - jekyll-optional-front-matter
  - jekyll-relative-links
  - jekyll-titles-from-headings

# Apply the theme's layout to every page (README + all .md files).
# Without this, pages render as unstyled HTML fragments with no <head>.
defaults:
  - scope:
      path: ""
    values:
      layout: default
